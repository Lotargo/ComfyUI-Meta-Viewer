<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library — ComfyUI Meta Viewer</title>
    <link rel="preload" href="/static/fonts/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/base/variables.css">
    <link rel="stylesheet" href="/static/css/base/reset.css">
    <link rel="stylesheet" href="/static/css/base/typography.css">
    <link rel="stylesheet" href="/static/css/components/buttons.css">
    <link rel="stylesheet" href="/static/css/components/inputs.css">
    <link rel="stylesheet" href="/static/css/features/library.css">
</head>
<body class="library-body">
    <header class="library-header">
        <div class="library-brand">
            <a class="header-logo" href="/"><span>Comfy</span>UI Meta Viewer</a>
            <span class="library-page-label">Library</span>
        </div>
        <nav class="library-nav" aria-label="Primary navigation">
            <label class="btn" for="library-add-files-input" style="cursor:pointer">Add Files</label>
            <input type="file" id="library-add-files-input" class="hidden-input" multiple accept="image/*" style="display:none">
            <a class="btn btn-ghost" href="/">Viewer</a>
            <a class="btn btn-primary" href="/library" aria-current="page">Library</a>
        </nav>
    </header>

    <div class="library-shell">
        <aside class="library-sidebar">
            <section>
                <div class="library-section-heading">Collections</div>
                <nav id="system-collections" class="collection-list" aria-label="System collections"></nav>
            </section>
            <section class="album-section">
                <div class="library-section-heading">
                    <span>Albums</span>
                    <button id="create-album" class="library-add-button" type="button" title="Create album" aria-label="Create album">+</button>
                </div>
                <nav id="album-list" class="collection-list" aria-label="Albums"></nav>
            </section>
            <div class="library-safety-note">
                <strong>Virtual organization</strong>
                Albums and favorites never move, rename, or delete physical files.
            </div>
        </aside>

        <main class="library-main">
            <div class="library-title-row">
                <div>
                    <p class="library-eyebrow">Media library</p>
                    <h1 id="collection-title">All assets</h1>
                    <p id="collection-summary" class="library-subtitle">Loading indexed assets…</p>
                </div>
                <div class="library-filters">
                    <label class="library-search">
                        <span class="sr-only">Search library</span>
                        <input id="library-search" type="search" placeholder="Search names, notes, tags…" autocomplete="off">
                    </label>
                    <div id="rating-filter-buttons" class="rating-filter-buttons">
                        <button type="button" class="rating-filter-btn" data-rating="1" title="Show 1 star">★</button>
                        <button type="button" class="rating-filter-btn" data-rating="2" title="Show 2 stars">★★</button>
                        <button type="button" class="rating-filter-btn" data-rating="3" title="Show 3 stars">★★★</button>
                        <button type="button" class="rating-filter-btn" data-rating="4" title="Show 4 stars">★★★★</button>
                        <button type="button" class="rating-filter-btn" data-rating="5" title="Show 5 stars">★★★★★</button>
                    </div>
                    <select id="library-sort" aria-label="Sort assets">
                        <option value="date:desc">Newest file</option>
                        <option value="date:asc">Oldest file</option>
                        <option value="added:desc">Recently indexed</option>
                        <option value="name:asc">Name A–Z</option>
                        <option value="name:desc">Name Z–A</option>
                        <option value="size:desc">Largest first</option>
                        <option value="rating:desc">Highest rated</option>
                    </select>
                </div>
            </div>

            <div id="selection-toolbar" class="selection-toolbar" hidden>
                <label class="select-visible"><input id="select-visible" type="checkbox"> Select visible</label>
                <span id="selection-count">0 selected</span>
                <div class="selection-actions">
                    <button class="btn btn-sm" type="button" data-bulk="favorite">Favorite</button>
                    <button class="btn btn-sm" type="button" data-bulk="unfavorite">Unfavorite</button>
                    <select id="bulk-album" aria-label="Album for selected assets">
                        <option value="">Add to album…</option>
                    </select>
                    <button id="remove-from-album" class="btn btn-sm" type="button" hidden>Remove from album</button>
                    <select id="bulk-rating" aria-label="Rating for selected assets">
                        <option value="">Set rating…</option>
                        <option value="0">Not rated</option>
                        <option value="1">★</option>
                        <option value="2">★★</option>
                        <option value="3">★★★</option>
                        <option value="4">★★★★</option>
                        <option value="5">★★★★★</option>
                    </select>
                    <button id="toolbar-copy-workflow" class="btn btn-sm" type="button" hidden>Copy Workflow</button>
                    <button id="toolbar-copy-pos-prompt" class="btn btn-sm" type="button" hidden>Copy Positive</button>
                    <button id="toolbar-copy-neg-prompt" class="btn btn-sm" type="button" hidden>Copy Negative</button>
                    <button id="edit-asset" class="btn btn-sm" type="button">Edit details</button>
                    <button id="set-album-cover" class="btn btn-sm" type="button" hidden>Set cover</button>
                    <button id="remove-from-index" class="btn btn-sm btn-danger" type="button">Remove from index</button>
                    <button id="clear-selection" class="btn btn-sm btn-ghost" type="button">Clear</button>
                </div>
            </div>

            <div id="library-feedback" class="library-feedback" role="status">Loading library…</div>
            <div id="asset-grid" class="asset-grid" aria-live="polite"></div>
            <button id="load-more" class="btn library-load-more" type="button" hidden>Load more</button>
        </main>
    </div>

    <dialog id="asset-editor" class="asset-editor">
        <form method="dialog" id="asset-editor-form">
            <div class="editor-heading">
                <div>
                    <p class="library-eyebrow">Asset details</p>
                    <h2 id="editor-title">Edit asset</h2>
                </div>
                <button class="editor-close" value="cancel" aria-label="Close" formnovalidate>×</button>
            </div>
            <label>Filename
                <input id="editor-filename" type="text" required maxlength="255" autocomplete="off">
            </label>
            <label>Rating
                <select id="editor-rating">
                    <option value="0">Not rated</option>
                    <option value="1">1 star</option>
                    <option value="2">2 stars</option>
                    <option value="3">3 stars</option>
                    <option value="4">4 stars</option>
                    <option value="5">5 stars</option>
                </select>
            </label>
            <label>Tags <span>comma-separated</span>
                <input id="editor-tags" type="text" maxlength="1000">
            </label>
            <label>Note
                <textarea id="editor-note" rows="5" maxlength="5000"></textarea>
            </label>
            <div class="editor-actions">
                <button class="btn btn-ghost" value="cancel" formnovalidate>Cancel</button>
                <button id="save-asset" class="btn btn-primary" value="default">Save</button>
            </div>
        </form>
    </dialog>

    <dialog id="album-dialog" class="asset-editor">
        <form method="dialog" id="album-dialog-form">
            <div class="editor-heading">
                <div>
                    <p class="library-eyebrow">Album</p>
                    <h2 id="album-dialog-title">Create album</h2>
                </div>
                <button class="editor-close" value="cancel" aria-label="Close" formnovalidate>×</button>
            </div>
            <label>Album name
                <input id="album-dialog-name" type="text" required maxlength="120" placeholder="Enter name…">
            </label>
            <div class="editor-actions">
                <button class="btn btn-ghost" value="cancel" formnovalidate>Cancel</button>
                <button id="save-album-btn" class="btn btn-primary" value="default">Save</button>
            </div>
        </form>
    </dialog>

    <div id="library-toast" class="library-toast" role="status" aria-live="polite"></div>
    <script type="module" src="/static/js/library.js"></script>
</body>
</html>
